<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projetos | 7arch Arquitetura e Interiores</title>
  <meta name="description" content="Conheça os projetos de arquitetura e interiores da 7arch — apartamentos transformados em lares com personalidade em São Paulo." />
  <link rel="icon" type="image/jpeg" href="./images/logo.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
  <style>
    /* ── GALLERY PAGE ───────────────────────────────────── */
    .gallery-hero {
      background: var(--verde);
      padding-top: calc(80px + clamp(3rem, 6vw, 5rem));
      padding-bottom: clamp(3rem, 5vw, 4rem);
      position: relative;
      overflow: hidden;
    }
    .gallery-hero .hero-seven {
      position: absolute;
      right: -2vw;
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--font-titulo);
      font-size: clamp(40vw, 55vw, 65vw);
      font-weight: 700;
      line-height: 0.85;
      color: rgba(250,250,248,0.04);
      pointer-events: none;
      user-select: none;
    }
    .gallery-hero-content { position: relative; z-index: 1; }
    .gallery-hero .label  { color: var(--dourado); }
    .gallery-hero h1      { color: var(--bege); margin-top: 0.75rem; }
    .gallery-hero p       { color: rgba(232,223,213,0.75); margin-top: 0.75rem; max-width: 500px; }

    /* Back link */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-titulo);
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(232,223,213,0.6);
      margin-bottom: 2rem;
      transition: color var(--trans);
    }
    .back-link:hover { color: var(--dourado); }
    .back-link svg   { width: 16px; height: 16px; }

    /* ── PROJECT GRID ───────────────────────────────────── */
    .projetos-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
      padding-block: clamp(3rem, 6vw, 5rem);
    }

    .projeto-thumb {
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      aspect-ratio: 4/3;
      background: var(--areia);
    }
    .projeto-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.55s ease;
      display: block;
    }
    .projeto-thumb:hover img { transform: scale(1.06); }

    .projeto-thumb-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(58,54,50,0.8) 0%, transparent 55%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 1.5rem;
      transition: background var(--trans);
    }
    .projeto-thumb:hover .projeto-thumb-overlay {
      background: linear-gradient(to top, rgba(74,82,64,0.88) 0%, rgba(74,82,64,0.15) 60%, transparent 100%);
    }

    .projeto-thumb-info { color: var(--fundo); }
    .projeto-thumb-info .label { color: var(--dourado); margin-bottom: 0.3rem; }
    .projeto-thumb-info h3     { color: var(--fundo); font-size: 1rem; }

    .thumb-count {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(58,54,50,0.65);
      backdrop-filter: blur(6px);
      color: var(--bege);
      font-family: var(--font-titulo);
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      padding: 0.3rem 0.65rem;
      border-radius: 100px;
    }

    .thumb-open-btn {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity var(--trans);
    }
    .thumb-open-btn span {
      background: rgba(250,250,248,0.15);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(250,250,248,0.3);
      color: var(--fundo);
      font-family: var(--font-titulo);
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.65rem 1.25rem;
      border-radius: var(--radius);
    }
    .projeto-thumb:hover .thumb-open-btn { opacity: 1; }

    /* ── LIGHTBOX ───────────────────────────────────────── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(30, 28, 26, 0.97);
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }
    .lightbox.open {
      opacity: 1;
      pointer-events: all;
    }

    /* Top bar */
    .lb-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1.75rem;
      flex-shrink: 0;
      z-index: 2;
    }
    .lb-info { color: var(--bege); }
    .lb-info .label { color: var(--dourado); font-size: 0.65rem; }
    .lb-info h3     { font-size: clamp(0.9rem, 2vw, 1.1rem); margin-top: 0.2rem; }

    .lb-counter {
      font-family: var(--font-titulo);
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      color: rgba(232,223,213,0.5);
    }
    .lb-counter strong { color: var(--bege); }

    .lb-close {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(232,223,213,0.6);
      border-radius: 50%;
      border: 1px solid rgba(232,223,213,0.15);
      transition: all var(--trans);
      cursor: pointer;
      background: none;
    }
    .lb-close:hover {
      color: var(--bege);
      border-color: rgba(232,223,213,0.4);
      background: rgba(232,223,213,0.08);
    }
    .lb-close svg { width: 20px; height: 20px; }

    /* Main stage */
    .lb-stage {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      min-height: 0;
    }

    .lb-media-wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 80px;
    }

    .lb-media-wrap img,
    .lb-media-wrap video {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 4px;
      transition: opacity 0.25s ease;
    }
    .lb-media-wrap.fading img,
    .lb-media-wrap.fading video { opacity: 0; }

    /* Arrows */
    .lb-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 3;
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(250,250,248,0.08);
      border: 1px solid rgba(250,250,248,0.15);
      border-radius: 50%;
      color: var(--bege);
      cursor: pointer;
      transition: all var(--trans);
      backdrop-filter: blur(6px);
    }
    .lb-arrow:hover {
      background: rgba(250,250,248,0.18);
      border-color: rgba(250,250,248,0.35);
      transform: translateY(-50%) scale(1.08);
    }
    .lb-arrow:disabled {
      opacity: 0.2;
      cursor: default;
      pointer-events: none;
    }
    .lb-arrow svg { width: 22px; height: 22px; }
    .lb-prev { left: 1.25rem; }
    .lb-next { right: 1.25rem; }

    /* Bottom thumbnails strip */
    .lb-strip {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 1rem 1.5rem 1.5rem;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .lb-strip::-webkit-scrollbar { display: none; }

    .lb-dot {
      width: 56px;
      height: 40px;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      opacity: 0.4;
      transition: opacity var(--trans), transform var(--trans);
      flex-shrink: 0;
      border: 1.5px solid transparent;
    }
    .lb-dot img, .lb-dot video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }
    .lb-dot.active {
      opacity: 1;
      border-color: var(--dourado);
      transform: scale(1.08);
    }
    .lb-dot:hover:not(.active) { opacity: 0.7; }

    /* Video play indicator on thumb strip */
    .lb-dot-video {
      position: relative;
      background: var(--verde);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--bege);
    }
    .lb-dot-video svg { width: 18px; height: 18px; }

    /* ── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 1024px) {
      .projetos-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .projetos-grid { grid-template-columns: 1fr; }
      .lb-media-wrap { padding: 0 56px; }
      .lb-arrow { width: 40px; height: 40px; }
      .lb-arrow svg { width: 18px; height: 18px; }
      .lb-prev { left: 0.5rem; }
      .lb-next { right: 0.5rem; }
      .lb-top { padding: 1rem; }
      .lb-dot { width: 40px; height: 28px; }
    }
  </style>
</head>

  <script src="./main.js"></script>
  <script>
  (function() {
    'use strict';

    /* ── PROJECT DATA ──────────────────────────────────── */
    var PROJETOS = [
      {
        id: 'jm',
        nome: 'Apê J+M',
        bairro: 'Moema',
        metragem: '140m²',
        capa: './images/projeto-1.png',
        media: [
          { type: 'img', src: './images/projeto-1.png',  alt: 'Sala de estar — Apê J+M' },
          { type: 'img', src: './images/projeto-2.png',  alt: 'Dormitório — Apê J+M' },
          { type: 'img', src: './images/apto-jm-3.png',  alt: 'Visão geral — Apê J+M' }
        ]
      },
      {
        id: 'ns',
        nome: 'Apê N+S',
        bairro: 'Jardins',
        metragem: '120m²',
        capa: './images/projeto-3.png',
        media: [
          { type: 'img', src: './images/projeto-3.png',  alt: 'Ambiente integrado — Apê N+S' },
          { type: 'img', src: './images/apto-ns-2.png',  alt: 'Detalhe — Apê N+S' },
          { type: 'img', src: './images/apto-ns-3.png',  alt: 'Visão geral — Apê N+S' }
        ]
      },
      {
        id: 'ef',
        nome: 'Apê E+F',
        bairro: 'Campo Belo',
        metragem: '95m²',
        capa: './images/projeto-4.png',
        media: [
          { type: 'img', src: './images/projeto-4.png',  alt: 'Projeto completo — Apê E+F' }
        ]
      },
      {
        id: 'ap',
        nome: 'Apê A+P',
        bairro: 'Jardim Europa',
        metragem: '200m²',
        capa: './images/projeto-5.png',
        media: [
          { type: 'img', src: './images/projeto-5.png',  alt: 'Ambientes integrados — Apê A+P' }
        ]
      },
      {
        id: 'dk',
        nome: 'Apê D+K',
        bairro: 'Vila Nova Conceição',
        metragem: '85m²',
        capa: './images/projeto-6.png',
        media: [
          { type: 'img', src: './images/projeto-6.png',  alt: 'Design contemporâneo — Apê D+K' }
        ]
      },
      {
        id: 'ip',
        nome: 'Apê I+P',
        bairro: 'Itaim Bibi',
        metragem: '160m²',
        capa: './images/projeto-7.png',
        media: [
          { type: 'img', src: './images/projeto-7.png',  alt: 'Varanda e sala integradas — Apê I+P' }
        ]
      },
      {
        id: 'di',
        nome: 'Apê D+I',
        bairro: 'Pinheiros',
        metragem: '110m²',
        capa: './images/projeto-8.png',
        media: [
          { type: 'img', src: './images/projeto-8.png', alt: 'Projeto completo — Apê D+I' },
          { type: 'video', src: './images/dorm-cesca.mp4', alt: 'Dormitório em vídeo — Apê D+I' }
        ]
      }
    ];

    /* ── RENDER PROJECT GRID ───────────────────────────── */
    var grid = document.getElementById('projetosGrid');

    PROJETOS.forEach(function(proj) {
      var card = document.createElement('div');
      card.className = 'projeto-thumb';
      card.setAttribute('data-id', proj.id);
      card.setAttribute('tabindex', '0');
      card.setAttribute('role', 'button');
      card.setAttribute('aria-label', 'Ver galeria ' + proj.nome + ' — ' + proj.bairro);

      card.innerHTML =
        '<img src="' + proj.capa + '" alt="' + proj.nome + ' — ' + proj.bairro + '" loading="lazy" />' +
        '<div class="projeto-thumb-overlay">' +
          '<div class="projeto-thumb-info">' +
            '<span class="label">' + proj.metragem + '</span>' +
            '<h3>' + proj.nome + ' — ' + proj.bairro + '</h3>' +
          '</div>' +
        '</div>' +
        '<span class="thumb-count">' + proj.media.length + ' ' + (proj.media.length === 1 ? 'foto' : 'fotos') + '</span>' +
        '<div class="thumb-open-btn"><span>Abrir galeria</span></div>';

      card.addEventListener('click',   function() { openLightbox(proj.id); });
      card.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openLightbox(proj.id); }
      });

      grid.appendChild(card);
    });

    /* ── LIGHTBOX STATE ────────────────────────────────── */
    var lb        = document.getElementById('lightbox');
    var lbWrap    = document.getElementById('lbMediaWrap');
    var lbStrip   = document.getElementById('lbStrip');
    var lbTitle   = document.getElementById('lbTitle');
    var lbLabel   = document.getElementById('lbLabel');
    var lbCurrent = document.getElementById('lbCurrent');
    var lbTotal   = document.getElementById('lbTotal');
    var lbPrev    = document.getElementById('lbPrev');
    var lbNext    = document.getElementById('lbNext');
    var lbClose   = document.getElementById('lbClose');

    var currentProj  = null;
    var currentIndex = 0;

    function findProj(id) {
      for (var i = 0; i < PROJETOS.length; i++) {
        if (PROJETOS[i].id === id) return PROJETOS[i];
      }
      return null;
    }

    function openLightbox(projId, index) {
      var proj = findProj(projId);
      if (!proj) return;
      currentProj  = proj;
      currentIndex = index || 0;
      renderLightbox();
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
      window.location.hash = projId;
      lbClose.focus();
    }

    function closeLightbox() {
      lb.classList.remove('open');
      document.body.style.overflow = '';
      // pause any playing video
      var vid = lbWrap.querySelector('video');
      if (vid) vid.pause();
      history.pushState(null, '', window.location.pathname);
    }

    function goTo(index) {
      if (!currentProj) return;
      var total = currentProj.media.length;
      if (index < 0) index = 0;
      if (index >= total) index = total - 1;

      lbWrap.classList.add('fading');
      var pause = lbWrap.querySelector('video');
      if (pause) pause.pause();

      setTimeout(function() {
        currentIndex = index;
        renderMedia();
        updateStrip();
        lbWrap.classList.remove('fading');
      }, 180);
    }

    function renderLightbox() {
      var proj  = currentProj;
      var total = proj.media.length;

      lbLabel.textContent   = proj.metragem + ' · ' + proj.bairro;
      lbTitle.textContent   = proj.nome;
      lbTotal.textContent   = total;

      renderMedia();
      renderStrip();
      updateNav();
    }

    function renderMedia() {
      var item  = currentProj.media[currentIndex];
      var total = currentProj.media.length;

      lbCurrent.textContent = currentIndex + 1;
      lbPrev.disabled = currentIndex === 0;
      lbNext.disabled = currentIndex === total - 1;

      lbWrap.innerHTML = '';

      if (item.type === 'video') {
        var vid = document.createElement('video');
        vid.src      = item.src;
        vid.controls = true;
        vid.autoplay = true;
        vid.setAttribute('aria-label', item.alt);
        vid.style.maxHeight = '100%';
        lbWrap.appendChild(vid);
      } else {
        var img = document.createElement('img');
        img.src = item.src;
        img.alt = item.alt;
        lbWrap.appendChild(img);
      }
    }

    function renderStrip() {
      lbStrip.innerHTML = '';
      currentProj.media.forEach(function(item, i) {
        var dot = document.createElement('div');
        dot.className = 'lb-dot' + (i === currentIndex ? ' active' : '');
        dot.setAttribute('tabindex', '0');
        dot.setAttribute('aria-label', 'Ir para mídia ' + (i + 1));

        if (item.type === 'video') {
          dot.classList.add('lb-dot-video');
          dot.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
        } else {
          var thumb = document.createElement('img');
          thumb.src = item.src;
          thumb.alt = '';
          thumb.loading = 'lazy';
          dot.appendChild(thumb);
        }

        var idx = i;
        dot.addEventListener('click', function() { goTo(idx); });
        dot.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); goTo(idx); }
        });

        lbStrip.appendChild(dot);
      });
    }

    function updateStrip() {
      var dots = lbStrip.querySelectorAll('.lb-dot');
      dots.forEach(function(d, i) {
        d.classList.toggle('active', i === currentIndex);
      });
      // scroll active dot into view
      if (dots[currentIndex]) {
        dots[currentIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }
    }

    function updateNav() {
      lbPrev.disabled = currentIndex === 0;
      lbNext.disabled = currentIndex === (currentProj ? currentProj.media.length - 1 : 0);
    }

    /* ── EVENT LISTENERS ───────────────────────────────── */
    lbClose.addEventListener('click', closeLightbox);

    lbPrev.addEventListener('click', function() { goTo(currentIndex - 1); });
    lbNext.addEventListener('click', function() { goTo(currentIndex + 1); });

    // Keyboard
    document.addEventListener('keydown', function(e) {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'ArrowLeft')  goTo(currentIndex - 1);
      if (e.key === 'ArrowRight') goTo(currentIndex + 1);
      if (e.key === 'Escape')     closeLightbox();
    });

    // Touch swipe
    var touchStartX = 0;
    lbWrap.addEventListener('touchstart', function(e) {
      touchStartX = e.touches[0].clientX;
    }, { passive: true });
    lbWrap.addEventListener('touchend', function(e) {
      var dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 40) {
        goTo(dx < 0 ? currentIndex + 1 : currentIndex - 1);
      }
    }, { passive: true });

    // Close on backdrop click (outside media)
    lb.addEventListener('click', function(e) {
      if (e.target === lb) closeLightbox();
    });

    /* ── DEEP LINK via URL hash ────────────────────────── */
    function checkHash() {
      var hash = window.location.hash.replace('#', '');
      if (!hash) return;
      var proj = findProj(hash);
      if (proj) openLightbox(hash, 0);
    }

    // Run on load
    checkHash();

  })();
  </script>
</body>
</html>
